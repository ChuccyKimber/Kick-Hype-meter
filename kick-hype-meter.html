<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kick Hype Meter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#53fc18;--gd:rgba(83,252,24,0.15);--gm:rgba(83,252,24,0.4);
  --bg:#0d0f0d;--b:rgba(83,252,24,0.12);--tp:#e8f5e0;--tm:rgba(232,245,224,0.4);
  --fd:'Syne',sans-serif;--fm:'DM Mono',monospace;
  --glow-size:0px;
}
body{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--fm);overflow:hidden}

/* ── STREAM BG ── */
.stream-bg{position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 30% 50%,rgba(83,252,24,0.03) 0%,transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(83,252,24,0.015) 40px,rgba(83,252,24,0.015) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(83,252,24,0.015) 40px,rgba(83,252,24,0.015) 41px)}
.mock-stream{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(232,245,224,0.05);font-family:var(--fd);font-size:clamp(60px,12vw,140px);
  font-weight:800;letter-spacing:-4px;pointer-events:none;user-select:none}

/* ── SCREEN SHAKE ── */
@keyframes shake{
  0%{transform:translate(0,0) rotate(0deg)}
  10%{transform:translate(-4px,-3px) rotate(-0.4deg)}
  20%{transform:translate(4px,3px) rotate(0.4deg)}
  30%{transform:translate(-3px,4px) rotate(0deg)}
  40%{transform:translate(3px,-4px) rotate(0.3deg)}
  50%{transform:translate(-2px,2px) rotate(-0.2deg)}
  60%{transform:translate(2px,-1px) rotate(0.1deg)}
  70%{transform:translate(-1px,1px) rotate(0deg)}
  100%{transform:translate(0,0) rotate(0deg)}
}
body.shake{animation:shake 0.45s ease-out}

/* ── PANEL ── */
.panel{
  position:fixed;right:0;top:0;bottom:0;width:78px;
  background:linear-gradient(180deg,rgba(17,20,17,0.97) 0%,rgba(13,15,13,0.97) 100%);
  border-left:1px solid var(--b);
  display:flex;flex-direction:column;align-items:center;
  padding:20px 0 16px;backdrop-filter:blur(12px);z-index:100;overflow:hidden;
  transition:box-shadow 0.5s;
}
.panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent 0%,var(--g) 50%,transparent 100%);
  opacity:0;transition:opacity 0.6s}
.panel.hyped::before{opacity:0.7}
/* Dynamic side glow that intensifies per level */
.panel.hyped{box-shadow:inset -8px 0 40px rgba(83,252,24,var(--glow-size,0))}

/* idle breathe on panel */
@keyframes panelBreathe{0%,100%{opacity:0.97}50%{opacity:1}}
.panel{animation:panelBreathe 4s ease-in-out infinite}

/* Logo */
.panel-logo{width:32px;height:32px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-logo svg{width:28px;height:28px}

/* ── LEVEL BADGE ── */
.level-badge{
  flex-shrink:0;width:42px;height:42px;
  border:1.5px solid rgba(83,252,24,0.3);border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(83,252,24,0.06);margin-bottom:10px;
  transition:border-color 0.3s,background 0.3s,box-shadow 0.4s;
  position:relative;overflow:hidden;
}
/* shimmer sweep on level badge */
.level-badge::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(83,252,24,0.12) 50%,transparent 60%);
  transform:translateX(-100%);transition:none;
}
.level-badge.shimmer::after{animation:badgeShimmer 0.5s ease-out forwards}
@keyframes badgeShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.panel.hyped .level-badge{border-color:var(--g);background:rgba(83,252,24,0.12);box-shadow:0 0 16px rgba(83,252,24,0.25)}
.level-badge-label{font-size:7px;letter-spacing:1px;color:var(--tm);text-transform:uppercase;font-family:var(--fm);line-height:1;margin-bottom:2px}
.level-badge-num{font-family:var(--fd);font-size:17px;font-weight:800;color:var(--tp);line-height:1;transition:color 0.3s}
.panel.hyped .level-badge-num{color:var(--g)}

@keyframes levelFlash{0%{transform:scale(1)}25%{transform:scale(1.32);border-color:var(--g);box-shadow:0 0 32px rgba(83,252,24,0.8)}100%{transform:scale(1)}}
@keyframes levelDown{0%{transform:scale(1)}25%{transform:scale(0.8);opacity:0.5}100%{transform:scale(1);opacity:1}}
.level-badge.flash{animation:levelFlash 0.55s ease-out forwards}
.level-badge.flash-down{animation:levelDown 0.45s ease-out forwards}

/* Milestone ring - extra outer ring on milestone levels */
.milestone-ring{
  position:absolute;inset:-6px;border:1.5px solid var(--g);border-radius:15px;
  opacity:0;pointer-events:none;
}
.level-badge.milestone .milestone-ring{animation:milestoneRing 1.2s ease-out forwards}
@keyframes milestoneRing{0%{opacity:0.9;inset:-2px}100%{opacity:0;inset:-14px}}

/* Threshold */
.threshold-label{font-size:7px;letter-spacing:1px;color:var(--tm);text-transform:uppercase;margin-bottom:6px;flex-shrink:0;transition:color 0.3s}
.panel.hyped .threshold-label{color:rgba(83,252,24,0.6)}

/* ── METER TRACK ── */
.meter-track{flex:1;width:28px;background:rgba(83,252,24,0.04);border:1px solid var(--b);border-radius:14px;position:relative;overflow:hidden;margin:0 0 10px}
.meter-track::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent,transparent calc(25% - 1px),rgba(13,15,13,0.8) calc(25% - 1px),rgba(13,15,13,0.8) 25%);
  z-index:2;pointer-events:none}

/* Idle breathe on fill */
@keyframes fillBreathe{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
.meter-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,var(--g) 0%,rgba(83,252,24,0.7) 60%,rgba(83,252,24,0.3) 100%);
  border-radius:0 0 14px 14px;
  transition:height 0.35s cubic-bezier(0.34,1.4,0.64,1);z-index:1;
  animation:fillBreathe 2.5s ease-in-out infinite;
}
.meter-fill::after{content:'';position:absolute;top:-24px;left:50%;transform:translateX(-50%);width:48px;height:48px;background:radial-gradient(circle,rgba(83,252,24,0.5) 0%,transparent 70%);pointer-events:none}
.meter-pulse{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--g);z-index:3;transition:bottom 0.35s cubic-bezier(0.34,1.4,0.64,1);box-shadow:0 0 8px 2px var(--g)}

/* ── SCORE BLOCK ── */
.score-block{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:3px}
.score-value{font-family:var(--fd);font-size:15px;font-weight:800;color:var(--tp);transition:color 0.3s;line-height:1}
.panel.hyped .score-value{color:var(--g)}
.score-unit{font-size:7px;letter-spacing:1.5px;color:var(--tm);text-transform:uppercase}
.score-fraction{font-size:7px;letter-spacing:0.5px;color:var(--tm);text-align:center;margin-bottom:6px;flex-shrink:0}

/* ── EVENT FEED ── */
.event-feed{width:100%;display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 0 0;overflow:hidden;max-height:56px;flex-shrink:0}
.event-dot{width:6px;height:6px;border-radius:50%;background:var(--gd);border:1px solid var(--gm);animation:dotFade 2s forwards;flex-shrink:0}
.event-dot.sub{background:rgba(83,252,24,0.5);border-color:var(--g);box-shadow:0 0 6px var(--g);width:8px;height:8px}
@keyframes dotFade{0%{opacity:1;transform:scale(1.4)}20%{opacity:1;transform:scale(1)}80%{opacity:0.4}100%{opacity:0}}

/* ── PARTICLES CANVAS ── */
#particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:490}

/* ── LEVEL-UP OVERLAY ── */
.levelup-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:510}
.levelup-toast{
  background:rgba(10,12,10,0.96);border:1px solid var(--g);border-radius:14px;
  padding:18px 32px;display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 0 60px rgba(83,252,24,0.3),0 0 120px rgba(83,252,24,0.1);
  opacity:0;transform:scale(0.85) translateY(10px);
  transition:opacity 0.2s,transform 0.25s cubic-bezier(0.34,1.5,0.64,1);
}
.levelup-overlay.show .levelup-toast{opacity:1;transform:scale(1) translateY(0)}
.levelup-tag{font-size:8px;letter-spacing:3px;color:var(--tm);text-transform:uppercase;font-family:var(--fm)}
.levelup-num{font-family:var(--fd);font-size:48px;font-weight:800;color:var(--g);line-height:1;text-shadow:0 0 30px rgba(83,252,24,0.6)}
.levelup-sub{font-size:9px;letter-spacing:1.5px;color:var(--tm);text-transform:uppercase;text-align:center}
.levelup-milestone{font-size:10px;letter-spacing:2px;color:var(--g);text-transform:uppercase;font-family:var(--fd);font-weight:800;margin-top:2px;opacity:0}
.levelup-overlay.show .levelup-milestone.visible{opacity:1}

/* Ripples */
.ripple-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:489}
.ripple-ring{position:absolute;border:1px solid rgba(83,252,24,0.5);border-radius:50%;width:10px;height:10px;opacity:0}
.ripple-ring.fire{animation:rippleOut 1s ease-out forwards}
@keyframes rippleOut{0%{width:10px;height:10px;opacity:0.8}100%{width:380px;height:380px;opacity:0}}

/* ── EXPANDED PANEL ── */
.panel-expanded{
  position:fixed;right:78px;top:50%;transform:translateY(-50%);
  width:240px;background:rgba(17,20,17,0.97);
  border:1px solid var(--b);border-right:none;border-radius:12px 0 0 12px;
  padding:20px 16px;backdrop-filter:blur(12px);
  z-index:99;opacity:0;pointer-events:none;
  transition:opacity 0.25s,transform 0.25s;
  transform:translateY(-50%) translateX(10px);
}
.panel:hover~.panel-expanded,.panel-expanded:hover{opacity:1;pointer-events:all;transform:translateY(-50%) translateX(0)}
.expanded-title{font-family:var(--fd);font-size:13px;font-weight:800;color:var(--g);letter-spacing:0.5px;margin-bottom:14px}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(83,252,24,0.06)}
.stat-row:last-of-type{border-bottom:none}
.stat-name{font-size:10px;color:var(--tm);letter-spacing:0.5px}
.stat-val{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--tp)}
.stat-val.green{color:var(--g)}

/* Progress bar */
.level-progress-wrap{margin-top:14px;background:rgba(83,252,24,0.05);border:1px solid rgba(83,252,24,0.15);border-radius:6px;padding:10px 12px}
.level-progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.lp-label{font-size:9px;letter-spacing:1.5px;color:var(--tm);text-transform:uppercase}
.lp-val{font-family:var(--fd);font-size:12px;font-weight:800;color:var(--g)}
.lp-track{height:4px;background:rgba(83,252,24,0.1);border-radius:2px;overflow:hidden}
.lp-fill{height:100%;background:var(--g);border-radius:2px;transition:width 0.35s ease;box-shadow:0 0 6px rgba(83,252,24,0.5)}
.lp-next{font-size:8px;color:var(--tm);margin-top:5px;text-align:right;letter-spacing:0.5px}

/* ── SPARKLINE ── */
.sparkline-wrap{margin-top:12px;background:rgba(83,252,24,0.03);border:1px solid rgba(83,252,24,0.1);border-radius:6px;padding:8px 10px}
.sparkline-label{font-size:8px;letter-spacing:1.5px;color:var(--tm);text-transform:uppercase;margin-bottom:6px}
#sparklineCanvas{width:100%;height:36px;display:block}

/* ── BURST ── */
.burst{position:fixed;right:78px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:200}
.burst-ring{position:absolute;top:50%;right:0;transform:translateY(-50%);width:4px;height:4px;border-radius:50%;background:var(--g);opacity:0}
.burst-ring.active{animation:burstRing 0.6s ease-out forwards}
@keyframes burstRing{0%{width:4px;height:4px;opacity:0.9;right:0}100%{width:60px;height:60px;opacity:0;right:-28px}}

/* ── CHAT SIM ── */
.chat-sim{position:fixed;bottom:120px;left:28px;width:240px;display:flex;flex-direction:column-reverse;gap:6px;pointer-events:none}
.chat-msg{font-size:11px;color:rgba(232,245,224,0.5);background:rgba(17,20,17,0.7);border-left:2px solid rgba(83,252,24,0.3);padding:5px 8px;border-radius:0 4px 4px 0;animation:msgSlide 0.25s ease-out;backdrop-filter:blur(4px)}
.chat-msg .username{color:var(--g);font-weight:500}
.chat-msg.caps{border-left-color:var(--g);color:rgba(232,245,224,0.85)}
@keyframes msgSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* ── NOTIFY ── */
.notify{position:fixed;top:28px;right:98px;background:var(--gd);border:1px solid rgba(83,252,24,0.3);border-radius:6px;padding:8px 14px;font-family:var(--fd);font-size:11px;font-weight:800;color:var(--g);letter-spacing:0.5px;opacity:0;transform:translateY(-4px);transition:all 0.3s;pointer-events:none;z-index:400}
.notify.show{opacity:1;transform:translateY(0)}

/* ── MILESTONE BANNER ── */
.milestone-banner{
  position:fixed;top:0;left:0;right:78px;
  background:linear-gradient(90deg,transparent,rgba(83,252,24,0.08),transparent);
  border-bottom:1px solid rgba(83,252,24,0.25);
  padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--fd);font-size:12px;font-weight:800;color:var(--g);letter-spacing:2px;text-transform:uppercase;
  opacity:0;transform:translateY(-100%);transition:opacity 0.3s,transform 0.3s;
  pointer-events:none;z-index:450;
}
.milestone-banner.show{opacity:1;transform:translateY(0)}

/* ── DEMO CONTROLS ── */
.demo-label{position:fixed;bottom:70px;left:50%;transform:translateX(calc(-50% - 39px));font-size:10px;letter-spacing:2px;color:var(--tm);text-transform:uppercase;white-space:nowrap}
.demo-controls{position:fixed;bottom:28px;left:50%;transform:translateX(calc(-50% - 39px));display:flex;gap:10px;z-index:300}
.btn{font-family:var(--fm);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;border-radius:6px;border:1px solid var(--b);background:rgba(17,20,17,0.9);color:var(--tm);cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px)}
.btn:hover{border-color:var(--g);color:var(--g);background:var(--gd)}
.btn.primary{border-color:var(--g);color:var(--g)}
.btn.primary:hover{background:rgba(83,252,24,0.2)}
.btn:active{transform:scale(0.96)}
</style>
</head>
<body>
<div class="stream-bg"></div>
<div class="mock-stream">LIVE</div>
<div class="notify" id="notify"></div>
<div class="chat-sim" id="chatSim"></div>
<canvas id="particleCanvas"></canvas>

<!-- Milestone banner -->
<div class="milestone-banner" id="milestoneBanner">
  <span>&#x26A1;</span><span id="milestoneText">MILESTONE</span><span>&#x26A1;</span>
</div>

<!-- Level-up overlay -->
<div class="levelup-overlay" id="levelupOverlay">
  <div class="levelup-toast">
    <div class="levelup-tag" id="levelupTag">LEVEL UP</div>
    <div class="levelup-num" id="levelupNum">2</div>
    <div class="levelup-sub" id="levelupSub">Next: 78 pts</div>
    <div class="levelup-milestone" id="levelupMilestone">MILESTONE REACHED</div>
  </div>
</div>

<div class="ripple-container">
  <div class="ripple-ring" id="r1"></div>
  <div class="ripple-ring" id="r2"></div>
  <div class="ripple-ring" id="r3"></div>
  <div class="ripple-ring" id="r4"></div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="panel-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="rgba(83,252,24,0.1)"/><path d="M8 6v16M8 14l6-8M8 14l7 8" stroke="#53fc18" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="level-badge" id="levelBadge">
    <div class="milestone-ring"></div>
    <div class="level-badge-label">LVL</div>
    <div class="level-badge-num" id="levelNum">1</div>
  </div>
  <div class="threshold-label" id="thresholdLabel">/ 50 pts</div>
  <div class="meter-track">
    <div class="meter-fill" id="meterFill" style="height:0%"></div>
    <div class="meter-pulse" id="meterPulse" style="bottom:0%"></div>
  </div>
  <div class="score-block">
    <div class="score-value" id="scoreValue">0</div>
    <div class="score-unit">pts</div>
  </div>
  <div class="score-fraction" id="scoreFraction">0 / 50</div>
  <div class="event-feed" id="eventFeed"></div>
</div>

<!-- Expanded panel -->
<div class="panel-expanded">
  <div class="expanded-title">&#x26A1; Hype Meter</div>
  <div class="stat-row"><span class="stat-name">Current Level</span><span class="stat-val green" id="statLevel">1</span></div>
  <div class="stat-row"><span class="stat-name">MSG / 10s</span><span class="stat-val green" id="statVelocity">0</span></div>
  <div class="stat-row"><span class="stat-name">Sub Events</span><span class="stat-val" id="statSubs">0</span></div>
  <div class="stat-row"><span class="stat-name">Peak Level</span><span class="stat-val" id="statPeakLevel">1</span></div>
  <div class="stat-row"><span class="stat-name">Session</span><span class="stat-val" id="statSession">00:00</span></div>
  <div class="level-progress-wrap">
    <div class="level-progress-header">
      <span class="lp-label">To next level</span>
      <span class="lp-val" id="lpVal">0 / 50</span>
    </div>
    <div class="lp-track"><div class="lp-fill" id="lpFill" style="width:0%"></div></div>
    <div class="lp-next" id="lpNext">Threshold: 50 pts</div>
  </div>
  <div class="sparkline-wrap">
    <div class="sparkline-label">Hype History</div>
    <canvas id="sparklineCanvas" width="200" height="36"></canvas>
  </div>
</div>

<div class="burst"><div class="burst-ring" id="burstRing"></div></div>

<div class="demo-label">Simulate Events</div>
<div class="demo-controls">
  <button class="btn primary" onclick="simChatBurst()">&#x1F4AC; Chat Burst</button>
  <button class="btn" onclick="simSubscriber(1)">&#x2B50; Sub x1</button>
  <button class="btn" onclick="simSubscriber(5)">&#x1F381; Gift x5</button>
  <button class="btn" onclick="simSubscriber(25)">&#x1F4A5; Gift x25</button>
  <button class="btn" onclick="simFollower()">+ Follow</button>
  <button class="btn" onclick="resetMeter()">&#x21BA; Reset</button>
</div>

<script>
// ═══════════════════════════════════════
//  LEVEL SYSTEM
//  threshold(n) = round(50 * 1.55^(n-1))
//  Milestones at levels: 5, 10, 15, 20, 25 ...
// ═══════════════════════════════════════
const BASE=50,SCALE=1.55;
const MILESTONES=new Set([5,10,15,20,25,30,40,50]);
function thresholdFor(lvl){return Math.round(BASE*Math.pow(SCALE,lvl-1))}

let level=1,hypeScore=0,peakLevel=1;
let msgVelocity=0,subCount=0,sessionStart=Date.now();

// Sparkline history — store normalised level+pct every 3s, max 60 points
const sparkHistory=new Array(60).fill(0);
let sparkTick=0;

function decayRate(){return 0.38+(level-1)*0.05}

// ── ADD HYPE ──
function addHype(amount){
  hypeScore+=amount;
  const t=thresholdFor(level);
  if(hypeScore>=t){
    const carry=hypeScore-t;
    level++;hypeScore=carry;
    if(level>peakLevel)peakLevel=level;
    triggerLevelChange(level,true);
  }
  triggerBurst();updateUI();
}

// ── DECAY ──
function decayHype(){
  hypeScore=Math.max(0,hypeScore-decayRate());
  if(hypeScore<=0&&level>1){
    level--;
    hypeScore=Math.round(thresholdFor(level)*0.8);
    triggerLevelChange(level,false);
  }
  updateUI();
}

// ── UPDATE UI ──
function updateUI(){
  const t=thresholdFor(level);
  const pct=Math.min(100,(hypeScore/t)*100);
  document.getElementById('meterFill').style.height=pct+'%';
  document.getElementById('meterPulse').style.bottom=pct+'%';
  document.getElementById('scoreValue').textContent=Math.round(hypeScore);
  document.getElementById('scoreFraction').textContent=Math.round(hypeScore)+' / '+t;
  document.getElementById('thresholdLabel').textContent='/ '+t+' pts';
  document.getElementById('levelNum').textContent=level;
  document.getElementById('statLevel').textContent=level;
  document.getElementById('statVelocity').textContent=msgVelocity;
  document.getElementById('statSubs').textContent=subCount;
  document.getElementById('statPeakLevel').textContent=peakLevel;
  document.getElementById('lpVal').textContent=Math.round(hypeScore)+' / '+t;
  document.getElementById('lpFill').style.width=pct+'%';
  document.getElementById('lpNext').textContent='Threshold: '+t+' pts';
  const el=Math.floor((Date.now()-sessionStart)/1000);
  document.getElementById('statSession').textContent=String(Math.floor(el/60)).padStart(2,'0')+':'+String(el%60).padStart(2,'0');

  // Dynamic glow intensity based on level
  const glowAmt=Math.min(0.12,(level-1)*0.015);
  document.documentElement.style.setProperty('--glow-size',glowAmt);

  const panel=document.getElementById('panel');
  if(level>=3||pct>65)panel.classList.add('hyped');
  else panel.classList.remove('hyped');
}

// ── LEVEL CHANGE ──
function triggerLevelChange(newLevel,isUp){
  const badge=document.getElementById('levelBadge');
  badge.classList.remove('flash','flash-down','shimmer','milestone');
  void badge.offsetWidth;
  badge.classList.add(isUp?'flash':'flash-down');
  setTimeout(()=>badge.classList.add('shimmer'),100);

  const isMilestone=isUp&&MILESTONES.has(newLevel);

  // Toast
  const t=thresholdFor(newLevel);
  document.getElementById('levelupTag').textContent=isUp?'LEVEL UP':'LEVEL DOWN';
  document.getElementById('levelupNum').textContent=newLevel;
  document.getElementById('levelupSub').textContent=isUp?'Next: '+t+' pts to Lv '+(newLevel+1):'Need '+t+' pts to recover';
  const mEl=document.getElementById('levelupMilestone');
  if(isMilestone){mEl.textContent='★ MILESTONE ★';mEl.classList.add('visible')}
  else{mEl.classList.remove('visible')}

  const ov=document.getElementById('levelupOverlay');
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),isUp?1900:1500);

  if(isUp){
    fireRipples(isMilestone);
    if(isMilestone){
      screenShake(true);
      spawnParticles(120);
      badge.classList.add('milestone');
      showMilestoneBanner('Level '+newLevel+' Milestone!');
    } else {
      screenShake(false);
      spawnParticles(45);
    }
    showNotify('Level '+newLevel+'!');
  } else {
    showNotify('Back to Level '+newLevel);
  }
}

// ── SCREEN SHAKE ──
function screenShake(heavy){
  document.body.classList.remove('shake');
  void document.body.offsetWidth;
  if(heavy){
    document.body.style.animation='shake 0.6s ease-out';
  } else {
    document.body.style.animation='shake 0.35s ease-out';
  }
  setTimeout(()=>document.body.style.animation='',700);
}

// ── PARTICLE SYSTEM ──
const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
let particles=[];

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

function spawnParticles(count){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1.5+Math.random()*5;
    const size=2+Math.random()*4;
    const life=0.6+Math.random()*0.8;
    particles.push({
      x:cx+((Math.random()-0.5)*200),
      y:cy+((Math.random()-0.5)*150),
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      size,life,maxLife:life,
      alpha:1,
      type:Math.random()<0.3?'square':'circle'
    });
  }
}


// Particle render
function updateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.98;
    p.life-=0.022;
    const a=(p.life/p.maxLife)*0.9;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle='#53fc18';
    if(p.type==='square'){
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    } else {
      ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(updateParticles);
}
requestAnimationFrame(updateParticles);

// ── RIPPLES ──
function fireRipples(heavy){
  const count=heavy?4:3;
  ['r1','r2','r3','r4'].slice(0,count).forEach((id,i)=>{

    setTimeout(()=>{el.classList.remove('fire');void el.offsetWidth;el.classList.add('fire')},i*180);
  });
}

// ── SPARKLINE ──
function drawSparkline(){
  const c=document.getElementById('sparklineCanvas');
  const x=c.getContext('2d');
  const w=c.width,h=c.height;
  x.clearRect(0,0,w,h);
  const data=sparkHistory;
  const max=Math.max(...data,1);
  x.strokeStyle='rgba(83,252,24,0.5)';
  x.lineWidth=1.5;
  x.beginPath();
  data.forEach((v,i)=>{
    const px=(i/(data.length-1))*w;
    const py=h-(v/max)*h*0.85-2;
    i===0?x.moveTo(px,py):x.lineTo(px,py);
  });
  x.stroke();
  // fill under
  x.lineTo(w,h);x.lineTo(0,h);x.closePath();
  x.fillStyle='rgba(83,252,24,0.06)';x.fill();
  // current dot
  const last=data[data.length-1];
  const dotX=w-1,dotY=h-(last/max)*h*0.85-2;
  x.beginPath();x.arc(dotX,dotY,2.5,0,Math.PI*2);
  x.fillStyle='#53fc18';x.fill();
}

setInterval(()=>{
  const t=thresholdFor(level);
  const val=level*10+(hypeScore/t)*10;
  sparkHistory.shift();sparkHistory.push(val);
  drawSparkline();
},3000);

function simSubscriber(count){
